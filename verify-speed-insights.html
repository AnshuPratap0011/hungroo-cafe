<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Insights Verification</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #000;
            margin-bottom: 10px;
        }
        .status {
            padding: 15px;
            margin: 15px 0;
            border-radius: 4px;
            font-weight: 500;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        pre {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .check-item {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .check-item:last-child {
            border-bottom: none;
        }
        .check-item strong {
            display: inline-block;
            width: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Vercel Speed Insights Verification</h1>
        <p>This page tests if Speed Insights is properly configured.</p>
        
        <div id="results"></div>
    </div>

    <!-- Include the Speed Insights initialization script -->
    <script src="assets/js/speed-insights-init.js"></script>

    <script>
        // Wait a moment for the script to initialize
        setTimeout(() => {
            const results = document.getElementById('results');
            let html = '<h2>Verification Results</h2>';
            
            // Check if window.si exists
            const siExists = typeof window.si === 'function';
            html += `<div class="check-item">
                <strong>window.si function:</strong>
                <span class="${siExists ? 'success' : 'error'}">${siExists ? '✓ Initialized' : '✗ Not found'}</span>
            </div>`;
            
            // Check if window.siq exists
            const siqExists = Array.isArray(window.siq);
            html += `<div class="check-item">
                <strong>window.siq queue:</strong>
                <span class="${siqExists ? 'success' : 'error'}">${siqExists ? '✓ Created' : '✗ Not found'}</span>
            </div>`;
            
            // Check if script tag is injected
            const scriptTags = document.querySelectorAll('script[src*="speed-insights"]');
            html += `<div class="check-item">
                <strong>Speed Insights scripts:</strong>
                <span class="${scriptTags.length > 0 ? 'success' : 'error'}">${scriptTags.length} found</span>
            </div>`;
            
            // List all Speed Insights script sources
            if (scriptTags.length > 0) {
                html += '<h3>Loaded Scripts:</h3><ul>';
                scriptTags.forEach(script => {
                    html += `<li><code>${script.src}</code></li>`;
                });
                html += '</ul>';
            }
            
            // Overall status
            if (siExists && siqExists && scriptTags.length > 0) {
                html += '<div class="status success">✓ Speed Insights is properly configured and initialized!</div>';
                html += '<div class="info"><strong>Note:</strong> Metrics are only sent in production. When deployed to Vercel, this will automatically track Web Vitals and performance data.</div>';
            } else {
                html += '<div class="status error">✗ Speed Insights setup incomplete. Please check the configuration.</div>';
            }
            
            results.innerHTML = html;
        }, 1000);
    </script>
</body>
</html>
